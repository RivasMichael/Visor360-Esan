        transition: opacity 1s ease, transform 1s ease;

      #btn-menu-2d {
        position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
        padding: 15px 30px; background-color: rgba(0, 0, 0, 0.7); color: white;

      AFRAME.registerGeometry('rounded-rect', {
        schema: { width: {default: 1}, height: {default: 1}, radius: {default: 0.05} },
        init: function(data) {
          var shape = new THREE.Shape();
          var w = data.width / 2, h = data.height / 2, r = Math.min(data.radius, w, h);
          shape.moveTo(-w + r, -h);
          shape.lineTo(w - r, -h);
          shape.quadraticCurveTo(w, -h, w, -h + r);
          shape.lineTo(w, h - r);
          shape.quadraticCurveTo(w, h, w - r, h);
          shape.lineTo(-w + r, h);
          shape.quadraticCurveTo(-w, h, -w, h - r);
          shape.lineTo(-w, -h + r);
          shape.quadraticCurveTo(-w, -h, -w + r, -h);
          this.geometry = new THREE.ShapeGeometry(shape, 8);
        }
      });

      AFRAME.registerComponent('rotate-with-camera', {
        tick: function () {
          var camera = this.el.sceneEl.camera; 
          if (!camera) return;
          var camEl = document.querySelector('[camera]');
          if (!camEl) return;
          var camRot = camEl.getAttribute('rotation');
          if(camRot){
              this.el.setAttribute('rotation', {x: 0, y: camRot.y, z: 0});
          }
        }
      });

      AFRAME.registerComponent('telekinesis-balon', {
        init: function () {
          this.manoActiva = null;
          this.agarrado = false;

          this.el.addEventListener('mousedown', (evt) => {
            if (this.agarrado) return;
            this.manoActiva = evt.detail.cursorEl || document.querySelector('#camara-principal'); 
            this.agarrado = true;
            this.el.removeAttribute('dynamic-body'); 
          });

          this.el.addEventListener('mouseup', () => {
            if (!this.agarrado) return;
            this.agarrado = false;
            this.el.setAttribute('dynamic-body', 'mass: 1; bounce: 0.75'); 
            
            var dir = new THREE.Vector3();
            this.manoActiva.object3D.getWorldDirection(dir);
            dir.multiplyScalar(-1); 
            dir.multiplyScalar(12); 
            dir.y += 4; 

            setTimeout(() => {
              if(this.el.components['dynamic-body']) {
                 this.el.components['dynamic-body'].body.velocity.set(0,0,0);
                 this.el.components['dynamic-body'].body.applyImpulse(
                   new CANNON.Vec3(dir.x, dir.y, dir.z),
                   new CANNON.Vec3(0, 0, 0)
                 );
              }
            }, 50);
            this.manoActiva = null;
          });
        },
        tick: function () {
          if (this.agarrado && this.manoActiva) {
            var posPuntero = new THREE.Vector3();
            this.manoActiva.object3D.getWorldPosition(posPuntero);
            var dirPuntero = new THREE.Vector3();
            this.manoActiva.object3D.getWorldDirection(dirPuntero);
            dirPuntero.multiplyScalar(-1);
            posPuntero.add(dirPuntero.multiplyScalar(0.6));
            this.el.object3D.position.copy(posPuntero);
          }
        }
      });

      AFRAME.registerComponent('sistema-puntos', {
        init: function () {
          this.puntos = 0;
          this.puedeAnotar = true;
          this.pelota = document.querySelector('#pelota-interactiva');
          this.marcador = document.querySelector('#texto-marcador');
          this.posAro = new THREE.Vector3(0, 3.5, -11.5); 
        },
        tick: function () {
          if (!this.pelota || !this.puedeAnotar) return;
          var posPelota = this.pelota.object3D.position;
          var distancia = posPelota.distanceTo(this.posAro);

          if (distancia < 0.8) {
            this.puntos++;
            this.marcador.setAttribute('value', 'PUNTOS: ' + this.puntos);
            this.pelota.setAttribute('color', '#00FF00'); 
            this.puedeAnotar = false; 
            
            setTimeout(() => {
              this.pelota.setAttribute('color', '#D95C14');
              this.puedeAnotar = true;
            }, 1500);
          }

          if (posPelota.y < -5 || posPelota.distanceTo(new THREE.Vector3(0,0,0)) > 30) {
             resetearPelota();
          }
        }
      });

      AFRAME.registerComponent('smooth-follow', {
        tick: function () {
          if (this.el.getAttribute('visible') === false) return;

          var cam = document.querySelector('#camara-principal').object3D;

          var targetPos = new THREE.Vector3(0, 0, -8);
          targetPos.applyMatrix4(cam.matrixWorld);

          this.el.object3D.position.lerp(targetPos, 0.08);

          var lookAtPos = new THREE.Vector3().copy(cam.position);
          lookAtPos.y = this.el.object3D.position.y;
          this.el.object3D.lookAt(lookAtPos);
        }
      });

        init: function () {
          var el = this.el;

          el.addEventListener('click', function (evt) {
            var panel = document.querySelector(data.target);
            var fondoOscuro = document.querySelector('#hotspot-darkbg'); // Fondo negro
            
            if (!panel) return;
            evt.stopPropagation(); 

            if (data.action === 'close') {
                panel.setAttribute('visible', 'false');
                panel.classList.remove('panel-activo');
                if(fondoOscuro) fondoOscuro.setAttribute('visible', 'false');
            } else {
                panel.setAttribute('visible', 'true');
                panel.classList.add('panel-activo');
                if(fondoOscuro) fondoOscuro.setAttribute('visible', 'true'); // Oscurece el mundo
                
                var cam = document.querySelector('#camara-principal').object3D;
                var startPos = new THREE.Vector3(0, 0, -8);
                startPos.applyMatrix4(cam.matrixWorld);
                panel.object3D.position.copy(startPos);
                
                var lookAtPos = new THREE.Vector3().copy(cam.position);
                lookAtPos.y = panel.object3D.position.y;
                panel.object3D.lookAt(lookAtPos);
            }
          });

              if (data.action !== 'close') el.setAttribute('scale', '0.9 0.9 0.9'); 
              else el.setAttribute('color', '#FF5555'); 
          });
          el.addEventListener('mouseleave', function () {
              if (data.action !== 'close') el.setAttribute('scale', '0.8 0.8 0.8');
              else el.setAttribute('color', '#FF0000');
          });
        }

      var _isDragging = false;
      var _mousedownX = 0, _mousedownY = 0;
      document.addEventListener('mousedown', function(e) {
        _mousedownX = e.clientX; _mousedownY = e.clientY; _isDragging = false;
      });
      document.addEventListener('mousemove', function(e) {
        if (e.buttons > 0) {
          var dx = e.clientX - _mousedownX, dy = e.clientY - _mousedownY;
          if (Math.sqrt(dx * dx + dy * dy) > 5) _isDragging = true;
        }
      });

      AFRAME.registerComponent('tour-logic', {

          var el = this.el;
          el.addEventListener('click', function (evt) {
            if (_isDragging) return;
            var target = el.getAttribute('data-target');
            var direccionDeseada = el.getAttribute('data-mirar');
            if (target && target !== "null") iniciarTransicion(target, direccionDeseada);
          });
          el.addEventListener('mouseenter', function () {
            el.setAttribute('animation__scale', 'property: scale; to: 2.1 2.1 2.1; dur: 200; easing: easeOutQuad');
            var etiqueta = el.querySelector('.etiqueta-flotante');
            if (etiqueta) etiqueta.setAttribute('visible', 'true');
          });
          el.addEventListener('mouseleave', function () {
            el.setAttribute('animation__scale', 'property: scale; to: 1.8 1.8 1.8; dur: 200; easing: easeOutQuad');

      function iniciarTransicion(nombreEscena, direccionDeseada) {
        var datos = escenas[nombreEscena];
        var contenedorFlechas = document.querySelector('#flechas-container');
        var cieloFondo = document.querySelector('#cielo-fondo'); 
        var overlayFade = document.querySelector('#overlay-fade');
        var btnLanzarMinijuego = document.querySelector('#btn-lanzar-minijuego');
        var fondoOscuro = document.querySelector('#hotspot-darkbg'); 
        var duracionFade = 500; 

        contenedorFlechas.setAttribute('visible', 'false');
        btnLanzarMinijuego.setAttribute('visible', 'false');
        btnLanzarMinijuego.classList.remove('clickable');
        
        if(fondoOscuro) fondoOscuro.setAttribute('visible', 'false'); 

        // Ocultar Hotspots al cambiar de escena
        var todosHotspots = document.querySelectorAll('.grupo-hotspots');
        todosHotspots.forEach(function(grupo) {
            grupo.setAttribute('visible', 'false');
            var paneles = grupo.querySelectorAll('.panel-activo');
            paneles.forEach(p => {
                p.setAttribute('visible', 'false');
                p.classList.remove('panel-activo');
            });
            var iconos = grupo.querySelectorAll('.icono-hotspot');
            iconos.forEach(i => i.classList.remove('clickable'));
        });
        
        overlayFade.setAttribute('animation', { property: 'material.opacity', from: 0, to: 1, dur: duracionFade, easing: 'linear' });

        setTimeout(() => {
            cieloFondo.setAttribute('src', datos.imagen);
            cieloFondo.setAttribute('rotation', datos.rotacionSky || "0 -90 0");
            generarFlechas(datos.flechas);
            
            var rig = document.querySelector('#rig');
            rig.setAttribute('rotation', direccionDeseada || "0 0 0");

            var camara = document.querySelector('#camara-principal');
            var lookControls = camara.components['look-controls'];
            if (lookControls) {
                lookControls.pitchObject.rotation.x = 0;
                lookControls.yawObject.rotation.y = 0;
            }

            var _revealed = false;
            var _revealTimeout;

            function revelarEscena() {
                if (_revealed) return;
                _revealed = true;
                clearTimeout(_revealTimeout);
                cieloFondo.removeEventListener('materialtextureloaded', revelarEscena);
                contenedorFlechas.setAttribute('visible', 'true');

                if (nombreEscena === 'basquet') {
                    btnLanzarMinijuego.setAttribute('visible', 'true');
                    btnLanzarMinijuego.classList.add('clickable');
                }

                var hotspotActual = document.querySelector('#hotspots-' + nombreEscena);
                if (hotspotActual) {
                    hotspotActual.setAttribute('visible', 'true');
                    var iconos = hotspotActual.querySelectorAll('.icono-hotspot');
                    iconos.forEach(i => i.classList.add('clickable'));
                }

                overlayFade.setAttribute('animation', { property: 'material.opacity', from: 1, to: 0, dur: duracionFade, easing: 'linear' });
                precargarAdyacentes(nombreEscena);
            }

            cieloFondo.addEventListener('materialtextureloaded', revelarEscena);
            _revealTimeout = setTimeout(revelarEscena, 3000);
        }, duracionFade + 50);
      }

      function resetearPelota() {
          var pelota = document.querySelector('#pelota-interactiva');
          if (pelota) {
              pelota.components['telekinesis-balon'].agarrado = false;
              if (!pelota.getAttribute('dynamic-body')) {
                  pelota.setAttribute('dynamic-body', 'mass: 1; bounce: 0.75');
              }
              setTimeout(() => {
                  if (pelota.components['dynamic-body']) {
                      pelota.components['dynamic-body'].body.velocity.set(0,0,0);
                      pelota.components['dynamic-body'].body.angularVelocity.set(0,0,0);
                      pelota.components['dynamic-body'].body.position.set(0, 1.2, -2); 
                  }
              }, 50);
          }
      }

      function activarMinijuego() {
          document.querySelector('#flechas-container').setAttribute('visible', 'false');
          document.querySelector('#btn-lanzar-minijuego').setAttribute('visible', 'false');
          document.querySelector('#btn-lanzar-minijuego').classList.remove('clickable');

          document.querySelector('#entorno-fisicas-basquet').setAttribute('visible', 'true');

          var btnVolver = document.querySelector('#btn-volver-tour');
          btnVolver.classList.add('clickable');
          var btnReset = document.querySelector('#btn-reset-balon');
          btnReset.classList.add('clickable');

          resetearPelota();
      }

      function desactivarMinijuego() {
          document.querySelector('#entorno-fisicas-basquet').setAttribute('visible', 'false');
          document.querySelector('#btn-volver-tour').classList.remove('clickable');
          document.querySelector('#btn-reset-balon').classList.remove('clickable');

          document.querySelector('#flechas-container').setAttribute('visible', 'true');
          
          var btnLanzarMinijuego = document.querySelector('#btn-lanzar-minijuego');
          btnLanzarMinijuego.setAttribute('visible', 'true');
          btnLanzarMinijuego.classList.add('clickable');
      }

      function generarFlechas(listaFlechas) {
        var contenedor = document.querySelector('#flechas-container');
        contenedor.innerHTML = '';
        listaFlechas.forEach(flecha => {
          
          var wrapper = document.createElement('a-entity');
          wrapper.setAttribute('position', flecha.position);
          wrapper.setAttribute('animation__float', `property: position; dir: alternate; dur: 2200; easing: easeInOutSine; loop: true; to: ${flecha.position.split(' ')[0]} ${(parseFloat(flecha.position.split(' ')[1]) + 0.22).toFixed(2)} ${flecha.position.split(' ')[2]}`);
          wrapper.setAttribute('animation__pulse', 'property: scale; from: 0.88 0.88 0.88; to: 1.22 1.22 1.22; dir: alternate; dur: 1600; easing: easeInOutSine; loop: true');

          var entidad = document.createElement('a-image');
          entidad.setAttribute('src', '#img-flecha-plana');
          entidad.setAttribute('scale', '1.8 1.8 1.8'); 
          entidad.setAttribute('look-at', '[camera]'); 
          entidad.setAttribute('transparent', 'true');
          
          entidad.setAttribute('data-target', flecha.target);
          entidad.setAttribute('class', 'clickable'); 
          if (flecha.mirarAlLlegar) {
              entidad.setAttribute('data-mirar', flecha.mirarAlLlegar);
          }
          entidad.setAttribute('tour-logic', ''); 

          var nombreLugar = nombresDestinos[flecha.target] || flecha.target;
          var lineas = nombreLugar.split('\n');
          var maxLen = Math.max(...lineas.map(l => l.length));
          var cardWidth = Math.max(maxLen * 0.13 + 0.4, 1.0);
          var cardHeight = lineas.length > 1 ? 0.80 : 0.58;

          var etiqueta = document.createElement('a-entity');
          etiqueta.classList.add('etiqueta-flotante');
          etiqueta.setAttribute('position', '0 1.2 0.05');
          etiqueta.setAttribute('scale', '0.9 0.9 0.9');
          etiqueta.setAttribute('visible', 'false');

          var fondo = document.createElement('a-entity');
          fondo.setAttribute('geometry', `primitive: rounded-rect; width: ${cardWidth.toFixed(2)}; height: ${cardHeight}; radius: 0.08`);
          fondo.setAttribute('material', 'color: #E3173E; opacity: 0.95');
          fondo.setAttribute('position', '0 0 -0.01');
          etiqueta.appendChild(fondo);

          var texto = document.createElement('a-text');
          texto.setAttribute('value', nombreLugar);
          texto.setAttribute('align', 'center');
          texto.setAttribute('color', '#FFFFFF');
          texto.setAttribute('font', 'exo2semibold');
          texto.setAttribute('width', (cardWidth * 0.88).toFixed(2));
          texto.setAttribute('wrap-count', String(maxLen));
          texto.setAttribute('position', '0 0 0.01');
          etiqueta.appendChild(texto);

          entidad.appendChild(etiqueta);
          wrapper.appendChild(entidad);
          contenedor.appendChild(wrapper);
        });
      }

      function construirMenu3D() {
        var menu = document.querySelector('#menu-3d');
        var keys = Object.keys(nombresDestinos);

        var panelFondo = document.createElement('a-entity');
        panelFondo.setAttribute('geometry', 'primitive: rounded-rect; width: 3.8; height: 3.2; radius: 0.15');
        panelFondo.setAttribute('material', 'color: #000000; opacity: 0.72');
        panelFondo.setAttribute('position', '0 0.15 -0.05');
        menu.appendChild(panelFondo);

        var titulo = document.createElement('a-text');
        titulo.setAttribute('value', 'MAPA VIRTUAL ESAN');
        titulo.setAttribute('align', 'center');
        titulo.setAttribute('color', '#FFFFFF');
        titulo.setAttribute('font', 'exo2semibold');
        titulo.setAttribute('position', '0 1.5 0');
        titulo.setAttribute('width', '4.5');
        menu.appendChild(titulo);

        let cols = 4;
        let startX = -1.35; let startY = 1.1; let gapX = 0.9; let gapY = 0.4;

        keys.forEach((key, index) => {
          let col = index % cols; let row = Math.floor(index / cols);
          let posX = startX + (col * gapX); let posY = startY - (row * gapY);

          var btn = document.createElement('a-entity');
          btn.setAttribute('geometry', 'primitive: rounded-rect; width: 0.8; height: 0.3; radius: 0.06');
          btn.setAttribute('material', 'color: #E3173E; opacity: 0.95');
          btn.setAttribute('position', `${posX} ${posY} 0`);
          btn.setAttribute('class', 'menu-btn'); btn.setAttribute('data-target', key);
          btn.setAttribute('menu-interactivo', '');

          var txt = document.createElement('a-text');
          txt.setAttribute('value', nombresDestinos[key]);
          txt.setAttribute('align', 'center'); txt.setAttribute('color', '#FFFFFF');
          txt.setAttribute('font', 'exo2semibold');
          txt.setAttribute('width', '0.76'); txt.setAttribute('wrap-count', '14');
          txt.setAttribute('position', '0 0 0.02');
          btn.appendChild(txt);
          menu.appendChild(btn);
        });

        var btnEnlaceBorder = document.createElement('a-entity');
        btnEnlaceBorder.setAttribute('geometry', 'primitive: rounded-rect; width: 2.64; height: 0.34; radius: 0.07');
        btnEnlaceBorder.setAttribute('material', 'color: #FFFFFF; opacity: 0.95');
        btnEnlaceBorder.setAttribute('position', '0.45 -0.9 -0.001');

        var btnEnlace = document.createElement('a-entity');
        btnEnlace.setAttribute('geometry', 'primitive: rounded-rect; width: 2.6; height: 0.3; radius: 0.06');
        btnEnlace.setAttribute('material', 'color: #222222; opacity: 0.95');
        btnEnlace.setAttribute('position', '0.45 -0.9 0'); btnEnlace.setAttribute('class', 'menu-btn');

        var txtEnlace = document.createElement('a-text');
        txtEnlace.setAttribute('value', 'Ver trayectoria historica');
        txtEnlace.setAttribute('align', 'center'); txtEnlace.setAttribute('color', '#FFFFFF');
        txtEnlace.setAttribute('font', 'exo2semibold');
        txtEnlace.setAttribute('width', '2.5'); txtEnlace.setAttribute('wrap-count', '35');
        txtEnlace.setAttribute('position', '0 0 0.02');
        btnEnlace.appendChild(txtEnlace);

        btnEnlace.addEventListener('click', function () { window.location.href = 'https://esanlabs.github.io/Doble-videos-Esan/'; });
        
        btnEnlace.addEventListener('mouseenter', function () {
            btnEnlace.setAttribute('material', 'color: #FFFFFF; opacity: 0.95');
            btnEnlace.setAttribute('scale', '1.05 1.05 1.05');
            txtEnlace.setAttribute('color', '#E3173E');
        });

        btnEnlace.addEventListener('mouseleave', function () {
            btnEnlace.setAttribute('material', 'color: #222222; opacity: 0.95');
            btnEnlace.setAttribute('scale', '1 1 1');
            txtEnlace.setAttribute('color', '#FFFFFF');
        });

        menu.appendChild(btnEnlaceBorder);
        menu.appendChild(btnEnlace);
      }

      function toggleMenu3D() {
        var menu = document.querySelector('#menu-3d');
        var cam = document.querySelector('#camara-principal');
        var btn2D = document.getElementById('btn-menu-2d');
        var isVisible = menu.getAttribute('visible');
        
        if (!isVisible) {
            var cam3D = cam.getObject3D('camera');
            if (cam3D) {
                var posCamara = new THREE.Vector3();
                cam3D.getWorldPosition(posCamara);
                var vectorDireccion = new THREE.Vector3();
                cam3D.getWorldDirection(vectorDireccion);
                vectorDireccion.multiplyScalar(2.5);
                var nuevaPosicion = posCamara.clone().add(vectorDireccion);
                menu.setAttribute('position', nuevaPosicion);
                menu.setAttribute('look-at', '[camera]');
            }
            menu.setAttribute('visible', 'true');
            if (btn2D) btn2D.innerText = 'Cerrar Menu de Navegacion';
            var botonesMenu = menu.querySelectorAll('.menu-btn');
            botonesMenu.forEach(b => b.classList.add('clickable'));
        } else {
            menu.setAttribute('visible', 'false');
            if (btn2D) btn2D.innerText = 'Abrir Menu de Navegacion';
            var botonesMenu = menu.querySelectorAll('.menu-btn');
            botonesMenu.forEach(b => b.classList.remove('clickable'));
        }
      }

      window.onload = function() { 
        var datos = escenas['entrada'];
        var cieloFondo = document.querySelector('#cielo-fondo');
        
        cieloFondo.setAttribute('src', datos.imagen);
        cieloFondo.setAttribute('rotation', datos.rotacionSky || '0 -90 0');
        
        generarFlechas(datos.flechas);
        construirMenu3D();
        aplicarMarcosPaneles();

        cieloFondo.addEventListener('materialtextureloaded', function onFirstTexture() {
            cieloFondo.removeEventListener('materialtextureloaded', onFirstTexture);
            ocultarLoader();
            precargarAdyacentes('entrada');
            var hotspotEntrada = document.querySelector('#hotspots-entrada');
            if (hotspotEntrada) {
                hotspotEntrada.setAttribute('visible', 'true');
                hotspotEntrada.querySelectorAll('.icono-hotspot').forEach(i => i.classList.add('clickable'));
            }
        });

        document.getElementById('btn-menu-2d').addEventListener('click', toggleMenu3D);
        document.querySelector('#btn-lanzar-minijuego').addEventListener('click', activarMinijuego);
        document.querySelector('#btn-volver-tour').addEventListener('click', desactivarMinijuego);
        document.querySelector('#btn-reset-balon').addEventListener('click', resetearPelota);

        document.getElementById('btn-capturar').addEventListener('click', function() {
            var cam = document.querySelector('#camara-principal').getObject3D('camera');
            if (!cam) return;

            var vectorDireccion = new THREE.Vector3();
            cam.getWorldDirection(vectorDireccion);
            
            var distancia = 12; 
            
            var posX = (vectorDireccion.x * distancia).toFixed(2);
            var posY = (vectorDireccion.y * distancia).toFixed(2); 
            var posZ = (vectorDireccion.z * distancia).toFixed(2);
            
            var anguloRad = Math.atan2(vectorDireccion.x, vectorDireccion.z);
            var rotY = Math.round(anguloRad * (180 / Math.PI));

            var codigoGenerado = `{ target: 'DESTINO', position: '${posX} ${posY} ${posZ}', rotation: '0 ${rotY} 0' },`;
            
            navigator.clipboard.writeText(codigoGenerado).then(function() {
                alert("✅ ¡Cartel capturado en tu portapapeles!\n\n" + codigoGenerado + "\n\nPegalo en tu código.");
            }).catch(function() {
                prompt("Copia este código:", codigoGenerado);
            });
            console.log("%c🎯 NUEVA COORDENADA CAPTURADA", "color: #E3173E; font-size: 16px; font-weight: bold;");
            console.log(codigoGenerado);
        });
      };

      function aplicarMarcosPaneles() {
        document.querySelectorAll('[id^="panel-info-"]').forEach(function(panel) {
          var plano = panel.querySelector('a-plane:not(.close-btn)');
          if (!plano) return;

          var w = parseFloat(plano.getAttribute('width') || 4);
          var h = parseFloat(plano.getAttribute('height') || 3);

          // Sombra desplazada para efecto de profundidad
          var sombra = document.createElement('a-entity');
          sombra.setAttribute('geometry', `primitive: rounded-rect; width: ${(w + 0.3).toFixed(2)}; height: ${(h + 0.3).toFixed(2)}; radius: 0.22`);
          sombra.setAttribute('material', 'color: #000000; opacity: 0.30; shader: flat');
          sombra.setAttribute('position', '0.10 -0.10 -0.05');

          // Marco rojo ESAN
          var marco = document.createElement('a-entity');
          marco.setAttribute('geometry', `primitive: rounded-rect; width: ${(w + 0.16).toFixed(2)}; height: ${(h + 0.16).toFixed(2)}; radius: 0.18`);
          marco.setAttribute('material', 'color: #E3173E; opacity: 1; shader: flat');
          marco.setAttribute('position', '0 0 -0.02');

          // Fondo blanco con esquinas redondeadas (reemplaza a-plane)
          var fondo = document.createElement('a-entity');
          fondo.setAttribute('geometry', `primitive: rounded-rect; width: ${w}; height: ${h}; radius: 0.14`);
          fondo.setAttribute('material', 'color: #FFFFFF; opacity: 0.98; shader: flat');
          fondo.setAttribute('position', '0 0 -0.01');

          panel.insertBefore(fondo, plano);
          panel.insertBefore(marco, fondo);
          panel.insertBefore(sombra, marco);
          plano.remove();
        });
      }

      function ocultarLoader() {
        var loader = document.getElementById('pantalla-carga');
        if (loader) {
          loader.classList.add('oculto');
          setTimeout(() => { loader.style.display = 'none'; }, 1000);
        }
      }

      const _preCache = {};
      function precargarAdyacentes(nombreEscena) {
        var datos = escenas[nombreEscena];
        if (!datos || !datos.flechas) return;
        datos.flechas.forEach(function(flecha) {
          var destino = escenas[flecha.target];
          if (!destino) return;
          var src = destino.imagen;
          if (!src || src.startsWith('#') || _preCache[src]) return;
          _preCache[src] = true;
          var img = new Image();
          img.src = src;
        });
      }
    </script>
  </head>
  
  <body>
    <div id="pantalla-carga">
        <h1 style="font-size: 3em; margin-bottom: 10px;">Tour ESAN 360</h1>
        <p style="font-size: 1.2em; letter-spacing: 2px;">INICIANDO REALIDAD VIRTUAL...</p>
    </div>

    <button id="btn-menu-2d">Abrir Menu de Navegacion</button>
    <button id="btn-capturar">🎯 Capturar Coordenada</button>

    <a-scene 
      physics="debug: false; gravity: -9.8"
      renderer="antialias: true; colorManagement: true; sortObjects: true;"
      cursor="rayOrigin: mouse" 
      raycaster="objects: .clickable">
      
      <a-assets timeout="10000">
        <img id="img-entrada" src="imagenes/entrada.jpg">

        <img id="img-flecha-plana" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M19 76 L54 30 L89 76' fill='none' stroke='rgba(0,0,0,0.45)' stroke-width='34' stroke-linecap='round' stroke-linejoin='round'/><path d='M17 74 L50 28 L83 74' fill='none' stroke='%23E3173E' stroke-width='26' stroke-linecap='round' stroke-linejoin='round'/><path d='M17 74 L50 28 L83 74' fill='none' stroke='white' stroke-width='14' stroke-linecap='round' stroke-linejoin='round'/></svg>">
        <img id="img-info-icon" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23FF0000'/><text x='50' y='75' font-family='Arial' font-size='65' font-weight='bold' fill='white' text-anchor='middle'>i</text></svg>">
      </a-assets>

      <a-sky id="cielo-fondo" radius="500" rotation="0 -90 0"></a-sky>
      <a-light type="ambient" color="#FFF" intensity="1.5"></a-light>
      
      <a-entity id="hotspot-darkbg" geometry="primitive: sphere; radius: 100" material="color: #000000; transparent: true; opacity: 0.6; side: back" visible="false"></a-entity>

      <a-entity id="flechas-container"></a-entity>
      <a-entity id="menu-3d" visible="false"></a-entity>

      <a-entity id="hotspots-entrada" class="grupo-hotspots" visible="false">
          <a-image
              src="#img-info-icon"
              position="-10.46 4.34 -3.97" scale="0.8 0.8 0.8"
              look-at="[camera]"
              class="icono-hotspot"
              hotspot-info="target: #panel-info-entrada; action: toggle">
          </a-image>

          <a-entity id="panel-info-entrada" visible="false" smooth-follow scale="1.5 1.5 1.5">
              <a-plane color="#FFFFFF" opacity="0.95" width="4" height="3" position="0 0 0"></a-plane>

              <a-text value="ENTRADA PRINCIPAL ESAN" color="#E3173E" align="center" width="7" position="0 1.15 0.01"></a-text>

              <a-text value="Bienvenido a la Universidad ESAN, una de las instituciones de educacion superior en negocios mas prestigiosas de America Latina.\n\nFundada en 1963, ESAN forma lideres con vision global, valores eticos y excelencia academica.\n\nExplora nuestro campus y descubre todo lo que tenemos para ti."
                      color="#333333" align="center" width="3.5" position="0 -0.15 0.01" wrap-count="35"></a-text>

              <a-plane class="clickable close-btn" color="#FF0000" width="0.4" height="0.4" position="1.75 1.2 0.02" hotspot-info="target: #panel-info-entrada; action: close">
                  <a-text value="X" color="#FFFFFF" align="center" width="6" position="0 0 0.01"></a-text>
              </a-plane>
          </a-entity>
      </a-entity>

      <a-entity id="hotspots-jardin" class="grupo-hotspots" visible="false">
          <a-image 
              src="#img-info-icon" 
              position="11.99 3 -0.20" scale="0.8 0.8 0.8" 
              look-at="[camera]" 
              class="clickable icono-hotspot" 
              hotspot-info="target: #panel-info-jardin; action: toggle">
          </a-image>

          <a-entity id="panel-info-jardin" visible="false" smooth-follow scale="1.5 1.5 1.5">
              <a-plane color="#FFFFFF" opacity="0.95" width="4" height="2.8" position="0 0 0"></a-plane>

              <a-text value="JARDIN CENTRAL" color="#E3173E" align="center" width="7" position="0 1.05 0.01"></a-text>

              <a-text value="Este es el area principal de descanso para los alumnos de ESAN.\n\nAquí puedes relajarte, conversar o estudiar al aire libre rodeado de naturaleza.\n\n¡Disfruta del entorno verde y mantenlo limpio!"
                      color="#333333" align="center" width="3.5" position="0 -0.1 0.01" wrap-count="35"></a-text>

              <a-plane class="clickable close-btn" color="#FF0000" width="0.4" height="0.4" position="1.7 1.1 0.02" hotspot-info="target: #panel-info-jardin; action: close">
                  <a-text value="X" color="#FFFFFF" align="center" width="6" position="0 0 0.01"></a-text>
              </a-plane>
          </a-entity>

          <a-image
              src="#img-info-icon"
              position="6.09 2.64 9.99" scale="0.8 0.8 0.8"
              look-at="[camera]"
              class="clickable icono-hotspot"
              hotspot-info="target: #panel-info-jardin2; action: toggle">
          </a-image>

          <a-entity id="panel-info-jardin2" visible="false" smooth-follow scale="1.5 1.5 1.5">
              <a-plane color="#FFFFFF" opacity="0.95" width="4" height="3" position="0 0 0"></a-plane>

              <a-text value="AREAS VERDES ESAN" color="#E3173E" align="center" width="7" position="0 1.15 0.01"></a-text>

              <a-plane class="clickable close-btn" color="#FF0000" width="0.4" height="0.4" position="1.75 1.2 0.02" hotspot-info="target: #panel-info-jardin2; action: close">

              </a-plane>

      </a-entity>


      <a-entity id="hotspots-fuente" class="grupo-hotspots" visible="false">

              <a-plane color="#FFFFFF" opacity="0.95" width="4" height="3" position="0 0 0"></a-plane>

              <a-text value="La fuente central es uno de los simbolos mas representativos del campus ESAN.\n\nEste espacio invita a la reflexion y al encuentro entre estudiantes, docentes y visitantes.\n\nUn punto de referencia que da vida y dinamismo al corazon del campus."
                      color="#333333" align="center" width="3.5" position="0 -0.15 0.01" wrap-count="35"></a-text>

              <a-plane class="clickable close-btn" color="#FF0000" width="0.4" height="0.4" position="1.75 1.2 0.02" hotspot-info="target: #panel-info-fuente; action: close">
                  <a-text value="X" color="#FFFFFF" align="center" width="6" position="0 0 0.01"></a-text>

      <a-entity id="hotspots-capilla" class="grupo-hotspots" visible="false">
          <a-image

              class="clickable icono-hotspot"
              hotspot-info="target: #panel-info-capilla; action: toggle">
          </a-image>

          <a-entity id="panel-info-capilla" visible="false" smooth-follow scale="1.5 1.5 1.5">
              <a-plane color="#FFFFFF" opacity="0.95" width="4" height="3.2" position="0 0 0"></a-plane>

              <a-text value="CAPILLA ESAN" color="#E3173E" align="center" width="7" position="0 1.25 0.01"></a-text>

              <a-text value="La Capilla de ESAN es un espacio sagrado de recogimiento y oracion.\n\nEste lugar esta consagrado a la memoria de los alumnos, profesores y miembros de la comunidad ESAN que han partido.\n\nAqui la comunidad universitaria se une en fe, gratitud y esperanza, recordando con carino a quienes dejaron una huella imborrable en nuestra institucion."
                      color="#333333" align="center" width="3.5" position="0 -0.15 0.01" wrap-count="35"></a-text>

                  <a-text value="X" color="#FFFFFF" align="center" width="6" position="0 0 0.01"></a-text>
              </a-plane>

      <a-entity id="hotspots-fablab" class="grupo-hotspots" visible="false">
          <a-image
              src="#img-info-icon"
              position="-10.98 2.64 -4.04" scale="0.8 0.8 0.8"
              look-at="[camera]"
              class="clickable icono-hotspot"
              hotspot-info="target: #panel-info-fablab; action: toggle">

              position="-6.24 5.00 8.94" scale="0.8 0.8 0.8"
              look-at="[camera]"
              class="clickable icono-hotspot"
              hotspot-info="target: #panel-info-cafeteria; action: toggle">
          </a-image>

          <a-entity id="panel-info-cafeteria" visible="false" smooth-follow scale="1.5 1.5 1.5">
              <a-plane color="#FFFFFF" opacity="0.95" width="4" height="3.2" position="0 0 0"></a-plane>

              <a-text value="CAFETERIA ESAN" color="#E3173E" align="center" width="7" position="0 1.25 0.01"></a-text>

              <a-text value="La Cafeteria de ESAN es el punto de encuentro favorito de la comunidad universitaria.\n\nUn espacio perfecto para estudiar, avanzar trabajos grupales o simplemente tomarse un cafe con los amigos entre clase y clase.\n\nCon un ambiente acogedor y una variada oferta de alimentos y bebidas, la cafeteria es el lugar donde las ideas fluyen y las amistades se fortalecen."
                      color="#333333" align="center" width="3.5" position="0 -0.15 0.01" wrap-count="35"></a-text>

              <a-plane class="clickable close-btn" color="#FF0000" width="0.4" height="0.4" position="1.75 1.3 0.02" hotspot-info="target: #panel-info-cafeteria; action: close">
                  <a-text value="X" color="#FFFFFF" align="center" width="6" position="0 0 0.01"></a-text>
              </a-plane>
          </a-entity>
      </a-entity>

      <a-plane id="btn-lanzar-minijuego" position="3 1.5 -8" look-at="[camera]" width="3" height="1" color="#E3173E" visible="false">
          <a-text value="¡Juega un rato!" align="center" color="#FFFFFF" scale="1.5 1.5 1.5"></a-text>
      </a-plane>

      <a-entity id="entorno-fisicas-basquet" position="0 0 0" visible="false" sistema-puntos>
          <a-plane static-body position="0 0 0" rotation="-90 0 0" width="20" height="20" color="#222222" opacity="0.8"></a-plane>
          <a-box static-body position="0 4 -12" width="2.5" height="1.5" depth="0.1" color="#FF0000" opacity="0.6"></a-box>
          <a-text id="texto-marcador" value="PUNTOS: 0" position="0 6 -12" align="center" color="#FFD700" scale="3 3 3"></a-text>

          <a-sphere 
              id="pelota-interactiva" 
              class="clickable"
              telekinesis-balon
              dynamic-body="mass: 1; bounce: 0.75" 
              position="0 1.5 -2" 
              radius="0.3" 
              color="#D95C14">
          </a-sphere>

          <a-plane id="btn-volver-tour" position="-3 1.5 -5" look-at="[camera]" width="2.5" height="0.8" color="#333333">
              <a-text value="Volver al Tour" align="center" color="#FFFFFF"></a-text>
          </a-plane>

          <a-plane id="btn-reset-balon" position="3 1.5 -5" look-at="[camera]" width="2.5" height="0.8" color="#00BFFF">
              <a-text value="Resetear Balon" align="center" color="#FFFFFF"></a-text>
          </a-plane>

          <a-light type="point" intensity="1.2" position="0 5 0"></a-light>
      </a-entity>

      <a-entity id="rig" position="0 1.6 0" rotation="0 0 0">
        <a-entity rotate-with-camera position="0 -1.5 0">
            <a-circle src="#img-logo" radius="1.5" position="0 0 0" rotation="-90 0 0" material="transparent: true; opacity: 1" shader="flat"></a-circle>
        </a-entity>

        <a-camera id="camara-principal" camera fov="80" wasd-controls-enabled="false" look-controls="reverseMouseDrag: true">
            <a-entity id="overlay-fade" geometry="primitive: sphere; radius: 0.1" material="color: #000; transparent: true; opacity: 0; side: back" position="0 0 0"></a-entity>
            
            <a-entity 
                geometry="primitive: ring; radiusInner: 0.015; radiusOuter: 0.025" 
                material="color: #00BFFF; shader: flat; opacity: 0.8" 
                position="0 0 -1" 
                raycaster="enabled: false">
            </a-entity>
        </a-camera>

        <a-entity laser-controls="hand: right" raycaster="objects: .clickable" vr-controller-listener></a-entity>
        <a-entity laser-controls="hand: left" raycaster="objects: .clickable" vr-controller-listener></a-entity>
      </a-entity>

    </a-scene>
  </body>
</html>
